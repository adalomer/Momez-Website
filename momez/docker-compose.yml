services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: momez-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME:-momez_db}
      MYSQL_USER: ${DATABASE_USER:-momez_user}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    # Production'da MySQL portunu dışarıya açmıyoruz (güvenlik)
    # Sadece docker network içinden erişilebilir
    # ports:
    #   - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backups:/backups
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - momez-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 60s

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: momez-app
    restart: always
    # Sadece localhost'tan erişim (Nginx reverse proxy kullanılacak)
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=mysql
      - DATABASE_PORT=${DATABASE_PORT:-3306}
      - DATABASE_NAME=${DATABASE_NAME:-momez_db}
      - DATABASE_USER=${DATABASE_USER:-momez_user}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - momez-network
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # phpMyAdmin - SADECE DEVELOPMENT/BAKIM İÇİN
  # Production'da bu servisi kapalı tutun veya güçlü şifre ile koruyun
  # Gerektiğinde: docker compose --profile admin up phpmyadmin -d
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: momez-phpmyadmin
    restart: unless-stopped
    profiles:
      - admin  # Sadece açıkça çağrıldığında başlar
    ports:
      - "127.0.0.1:8080:80"  # Sadece localhost'tan erişim
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      PMA_ABSOLUTE_URI: /phpmyadmin/
    depends_on:
      - mysql
    networks:
      - momez-network

volumes:
  mysql_data:
    driver: local
  uploads:
    driver: local

networks:
  momez-network:
    driver: bridge
