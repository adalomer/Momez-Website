services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: momez-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME:-momez_db}
      MYSQL_USER: ${DATABASE_USER:-momez_user}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    # Production'da MySQL portunu dışarıya açmıyoruz (güvenlik)
    # Sadece docker network içinden erişilebilir
    # ports:
    #   - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backups:/backups
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - momez-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 60s

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: momez-app
    restart: always
    # Sadece localhost'tan erişim (Nginx reverse proxy kullanılacak)
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=mysql
      - DATABASE_PORT=${DATABASE_PORT:-3306}
      - DATABASE_NAME=${DATABASE_NAME:-momez_db}
      - DATABASE_USER=${DATABASE_USER:-momez_user}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - momez-network
    volumes:
      - ./public/uploads:/app/public/uploads
    # GÜVENLİK: Resource limitleri
    deploy:
      resources:
        limits:
          cpus: '2.0'      # Max 2 CPU core
          memory: 2G       # Max 2GB RAM
        reservations:
          cpus: '0.5'
          memory: 512M
    # GÜVENLİK: Privilege escalation engelle
    security_opt:
      - no-new-privileges:true
    # GÜVENLİK: Root olarak çalışma
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get({hostname: 'localhost', port: 3000, path: '/', timeout: 5000}, (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: momez-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/momez.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./public:/app/public:ro
      - ./public/uploads:/app/public/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - momez-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # phpMyAdmin - SADECE DEVELOPMENT/BAKIM İÇİN
  # Production'da bu servisi kapalı tutun veya güçlü şifre ile koruyun
  # Gerektiğinde: docker compose --profile admin up phpmyadmin -d
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: momez-phpmyadmin
    restart: unless-stopped
    profiles:
      - admin  # Sadece açıkça çağrıldığında başlar
    ports:
      - "127.0.0.1:8080:80"  # Sadece localhost'tan erişim
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      PMA_ABSOLUTE_URI: /phpmyadmin/
    depends_on:
      - mysql
    networks:
      - momez-network

  # Certbot - SSL sertifikası yenileme
  # Gerektiğinde: docker compose --profile ssl up certbot -d
  certbot:
    image: certbot/certbot:latest
    container_name: momez-certbot
    restart: unless-stopped
    profiles:
      - ssl  # Sadece açıkça çağrıldığında başlar
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - momez-network

  # Watchtower - Container'ları izle ve çökerse yeniden başlat
  watchtower:
    image: containrrr/watchtower:latest
    container_name: momez-watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_REVIVE_STOPPED=true
      - WATCHTOWER_LABEL_ENABLE=false
    command: --interval 300 momez-mysql momez-app momez-nginx

volumes:
  mysql_data:
    driver: local

networks:
  momez-network:
    driver: bridge
