<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Momez Admin Panel Girişi</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ee2b2b",
              "background-light": "#f8f6f6",
              "background-dark": "#221010",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
</head>
<body class="font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-hidden bg-background-light dark:bg-background-dark">
<div class="layout-container flex h-full grow flex-col">
<div class="flex flex-1 justify-center">
<div class="flex flex-col flex-1">
<div class="grid grid-cols-1 lg:grid-cols-2 min-h-screen">
<!-- Left Column: Image -->
<div class="relative hidden lg:flex flex-col items-center justify-center p-8 bg-black">
<div class="w-full h-full bg-center bg-no-repeat bg-cover aspect-auto rounded-xl" data-alt="A stylish red and white sneaker against a dark background" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBnttkCoO8iGoRfGt291n9j2ZM77jL_fGOdQh61OV35v9wyqScEywiHs0-7_TDdqPf6AQaTHFAY1zCtfqcDjbL54OE531YaCuoby_zHyWX8sSzOPty8nJFjVA5DeVWX23v4ij8FHmEantg9MAaQeDdyG6x2H2x4as366uJBqtmhPpvndOZkT77FYEivlNy7jdtcu8E5XxCD97vZfEvzeZoXuzDI5xIsV2h_j2WrQ7UxZ2pSc2tImLQ-HQ_d0Q42K9F6nvwrcK0a4zMO");'></div>
<div class="absolute top-8 left-8">
<h1 class="text-white text-3xl font-black">momez</h1>
</div>
</div>
<!-- Right Column: Form -->
<div class="flex flex-col justify-center items-center p-8 sm:p-12 bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100">
<div class="w-full max-w-md space-y-8">
<div class="text-center lg:text-left">
<div class="lg:hidden mb-8">
<h1 class="text-primary text-4xl font-black">momez</h1>
</div>
<p class="text-4xl font-black leading-tight tracking-[-0.033em]">Admin Panel Girişi</p>
<p class="mt-2 text-gray-600 dark:text-gray-400">Yönetim paneline erişmek için giriş yapın.</p>
</div>
<!-- Alert Area -->
<!-- 
                                Example of an error message:
                                <div class="flex items-center gap-3 rounded-lg border border-red-200 bg-red-50 p-4 text-red-700 dark:border-red-900/50 dark:bg-red-500/10 dark:text-red-400">
                                    <span class="material-symbols-outlined text-xl">error</span>
                                    <p class="text-sm font-medium">Geçersiz e-posta veya şifre</p>
                                </div>
                                -->
<div class="space-y-6">
<label class="flex flex-col">
<p class="text-base font-medium leading-normal pb-2">E-posta Adresi</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">mail</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-gray-900 dark:text-gray-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800/50 focus:border-primary h-14 placeholder:text-gray-500 p-[15px] pl-11 text-base font-normal leading-normal" placeholder="admin@momez.com" type="email" value=""/>
</div>
</label>
<label class="flex flex-col">
<p class="text-base font-medium leading-normal pb-2">Şifre</p>
<div class="relative flex w-full flex-1 items-stretch">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">lock</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-gray-900 dark:text-gray-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800/50 focus:border-primary h-14 placeholder:text-gray-500 p-[15px] pl-11 pr-11 text-base font-normal leading-normal" placeholder="••••••••" type="password" value=""/>
<button class="absolute right-0 top-0 h-full px-3 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300" data-icon="Eye" data-size="24px" data-weight="regular">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<p class="text-gray-500 dark:text-gray-400 text-sm font-normal leading-normal pt-2">En az 8 karakter, büyük/küçük harf, rakam içermelidir.</p>
</label>
</div>
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 text-sm select-none">
<input class="form-checkbox h-4 w-4 rounded border-gray-300 text-primary focus:ring-primary/50 dark:bg-gray-800 dark:border-gray-600" type="checkbox"/>
                                        Beni Hatırla
                                    </label>
<a class="text-sm font-medium text-primary hover:underline" href="#">Şifremi Unuttum?</a>
</div>
<div>
<button class="flex w-full items-center justify-center rounded-lg bg-primary h-14 px-6 text-base font-bold text-white shadow-sm hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-background-dark transition-colors">
                                        Giriş Yap
                                        <!-- Loading state example:
                                        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                        </svg>
                                        -->
</button>
</div>
<div class="text-center">
<p class="text-xs text-gray-500 dark:text-gray-400">Güvenliğiniz için girişler IP adresi ile kayıt altına alınmaktadır.</p>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
</body></html>
